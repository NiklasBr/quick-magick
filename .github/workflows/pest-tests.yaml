name: Run Pest Tests

on:
    push:
        branches: [ main ]
    pull_request:
        branches: [ main ]

jobs:
    pest:
        runs-on: ubuntu-latest

        steps:
            # https://github.com/actions/checkout
            - name: Checkout code
              uses: actions/checkout@v6

            # https://github.com/shivammathur/setup-php
            - name: Setup PHP
              uses: shivammathur/setup-php@v2
              with:
                  php-version: 8.3
                  tools: composer:v2
                  coverage: xdebug
              env:
                  XDEBUG_MODE: coverage

            # Install (and cache) Composer dependencies
            # https://github.com/ramsey/composer-install
            - uses: ramsey/composer-install@v4

            - name: Run Pest tests
              run: composer pest:test -- --ci --coverage-clover=.github/clover.xml

            # https://github.com/timkrase/phpunit-coverage-badge
            - name: Generate code coverage badge
              uses: timkrase/phpunit-coverage-badge@v1.2.1
              if: github.ref == 'refs/heads/main'
              with:
                  report: '.github/clover.xml'
                  coverage_badge_path: '.github/badge-coverage.svg'
                  push_badge: true
                  repo_token: ${{ secrets.GITHUB_TOKEN }}
                  commit_message: 'chore: update coverage badge [skip ci]'
